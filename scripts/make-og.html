<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; width: 1200px; height: 630px; overflow: hidden; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #eef2ff;
      background:
        radial-gradient(900px 500px at 18% 20%, rgba(138,216,255,.22), transparent 55%),
        radial-gradient(800px 480px at 85% 80%, rgba(255,224,129,.14), transparent 55%),
        linear-gradient(160deg, #070b16, #04050b 55%, #0a1224);
      display: grid;
      place-items: center;
    }
    .card { width: 1040px; }
    .kicker {
      font-size: 22px; letter-spacing: .28em; text-transform: uppercase;
      color: #ffe081; font-weight: 700; margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 18px; font-size: 72px; line-height: 1.05; font-weight: 800;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0; max-width: 820px; font-size: 28px; line-height: 1.4;
      color: #c7d2e8;
    }
    .url {
      margin-top: 42px; font-size: 24px; color: #8ad8ff; letter-spacing: .08em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="kicker">Frontend & Game Developer</div>
    <h1>Raymond van der Walt</h1>
    <p>Cinematic UI · React / TypeScript · Unreal Engine 5 · performance-first products</p>
    <div class="url">rayvdw.dev</div>
  </div>
</body>
</html>
